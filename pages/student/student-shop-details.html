      <div class="nav-center">

          <a

      </div>

      <!-- RIGHT: profile -->

    <!-- ════════════════════════════════════════
         LAYOUT
         ════════════════════════════════════════ -->

      <div class="left-nav" id="sidebar">
        <ul class="nav-list">
          <li>

          </li>
          <li>

            <a href="student-cart.html" class="nav-link">
              <i class="fa-solid fa-cart-shopping"></i><span>Cart</span>
              <span class="nav-badge">3</span>

      <!-- MAIN -->
      <div class="main-content">
        <!-- SHOP HERO BANNER -->
        <div class="shop-detail-hero" id="shopHero">
          <div class="shop-hero-overlay"></div>
          <img id="shopHeroImg" src="" alt="" class="shop-hero-bg" />
          <div class="shop-hero-content">
            <a href="student-browse-food.html?tab=shops" class="back-btn" id="backBtn">
              <i class="fa-solid fa-arrow-left"></i> Back to Shops
            </a>
            <div class="shop-hero-info">
              <div class="shop-hero-avatar" id="shopHeroAvatar">
                <img id="shopHeroAvatarImg" src="" alt="" />
              </div>
              <div class="shop-hero-text">
                <h1 id="shopDetailName"></h1>
                <div class="shop-hero-meta">
                  <span class="shop-hero-cat" id="shopDetailCat"></span>
                  <span class="shop-hero-rating" id="shopDetailRating"></span>
                  <span class="shop-hero-items" id="shopDetailItems"></span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- ABOUT SECTION -->
        <div class="shop-detail-body">
          <div class="shop-about-card" id="shopAboutCard">
            <div class="shop-about-icon"><i class="fa-solid fa-circle-info"></i></div>
            <div>
              <div class="shop-about-label">About this Shop</div>
              <p id="shopDetailDesc" class="shop-about-text"></p>
            </div>
          </div>

          <!-- MENU SECTION -->
          <div class="shop-menu-header">
            <h2><i class="fa-solid fa-utensils"></i> Menu</h2>
            <div class="shop-menu-count" id="shopMenuCount"></div>
          </div>

          <div class="food-grid" id="shopFoodGrid"></div>
        </div>
      </div>
    </div>

    <!-- FOOD DETAIL MODAL -->
    <div class="food-modal-overlay" id="foodModal">
      <div class="food-modal">
        <img id="modalImg" class="modal-img" src="" alt="" />
        <div class="modal-body">
          <div class="modal-header-row">
            <div>
              <div class="modal-food-name" id="modalName"></div>
              <div class="modal-food-price" id="modalPrice"></div>
            </div>
            <button class="modal-close-btn" id="modalClose">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </div>
          <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px;">
            <span id="modalVendor" style="font-size: 13px; color: #64748b"></span>
            <span id="modalPrep" style="font-size: 13px; color: #f97316"></span>
            <span id="modalRating" style="font-size: 13px; color: #fbbf24; font-weight: 700"></span>
          </div>
          <div class="modal-section-label">Description</div>
          <p id="modalDesc" style="font-size: 14px; color: #64748b; line-height: 1.6"></p>
          <div class="modal-section-label">Ingredients</div>
          <div id="modalIngredients" class="food-ingredients"></div>
          <div class="modal-section-label">Customer Reviews</div>
          <div id="modalReviews"></div>
          <button class="modal-add-btn" id="modalAddBtn">
            <i class="fa-solid fa-cart-shopping"></i> Add to Cart
          </button>
        </div>
      </div>
    </div>

    <!-- TOAST CONTAINER -->
    <div id="toast-container"></div>

    <script>
      /* ─────────── SHARED DATA ─────────── */
      const shops = [
        {
          id: 1,
          name: "Canteen 1 — Mang Tino's",
          shortName: "Mang Tino's",
          category: "Meals",
          img: "../../images/silog.avif",
          rating: 4.5,
          desc: "Home-cooked Filipino comfort food served fresh every day. Known for generous rice meals and friendly service inside the university canteen.",
          foods: [1, 2]
        },
        {
          id: 2,
          name: "Street Bites Corner",
          shortName: "Street Bites",
          category: "Snacks",
          img: "../../images/kwek.jpg",
          rating: 4.7,
          desc: "Your favorite campus street-food station. Hot, crispy, and always satisfying snacks served right at your doorstep.",
          foods: [3, 5]
        },
        {
          id: 3,
          name: "Sip & Chill Beverages",
          shortName: "Sip & Chill",
          category: "Drinks",
          img: "../../images/milktea.avif",
          rating: 4.8,
          desc: "Premium campus drinks — from cold brews to fruit shakes. The go-to spot for students who need a boost between classes.",
          foods: [4, 6]
        },
        {
          id: 4,
          name: "Sweet Tooth Desserts",
          shortName: "Sweet Tooth",
          category: "Desserts",
          img: "../../images/halo.avif",
          rating: 4.6,
          desc: "Delightful desserts made fresh daily. From halo-halo to leche flan, we satisfy every sweet craving on campus.",
          foods: []
        },
        {
          id: 5,
          name: "Green Bowl — Healthy Eats",
          shortName: "Green Bowl",
          category: "Healthy",
          img: "../../images/pancit.avif",
          rating: 4.9,
          desc: "Light, nutritious, and flavorful meals for health-conscious students. Every bowl is packed with fresh ingredients.",
          foods: []
        },
        {
          id: 6,
          name: "Campus Pizza Hub",
          shortName: "Pizza Hub",
          category: "Meals",
          img: "../../images/pizza.avif",
          rating: 4.4,
          desc: "Crispy, cheesy campus pizza made to order. Perfect for group sharing or a quick bite between lectures.",
          foods: []
        }
      ];

      const foods = [
        {
          id: 1,
          name: "Burger",
          price: "₱30.00",
          category: "meals",
          img: "../../images/burger.avif",
          badge: "popular",
          rating: 4.5,
          vendor: "Canteen 1",
          prepTime: "8 min",
          desc: "Juicy beef patty with lettuce, tomato, cheese, and our special sauce.",
          ingredients: ["Beef patty","Lettuce","Tomato","Cheese","Special sauce","Bun"],
          reviews: [
            { name: "Ana R.", stars: 5, comment: "Best burger on campus! Always fresh." },
            { name: "Mark T.", stars: 4, comment: "Great taste, a bit small for the price." }
          ]
        },
        {
          id: 2,
          name: "Shomai Rice",
          price: "₱20.00",
          category: "meals",
          img: "../../images/Shomai-rice.jpg",
          badge: "",
          rating: 5.0,
          vendor: "Student Vendor",
          prepTime: "5 min",
          desc: "Steamed dumplings served over warm rice with savory sauce.",
          ingredients: ["Shomai","White rice","Soy sauce","Sesame oil","Green onion"],
          reviews: [
            { name: "Lisa M.", stars: 5, comment: "Absolutely love this! Perfect comfort food." },
            { name: "Jake P.", stars: 5, comment: "Worth every peso. Filling and delicious." }
          ]
        },
        {
          id: 3,
          name: "Shomai",
          price: "₱15.99",
          category: "snacks",
          img: "../../images/Shomai.jpg",
          badge: "new",
          rating: 4.7,
          vendor: "Canteen 3",
          prepTime: "6 min",
          desc: "Classic steamed dumplings with pork and prawn filling.",
          ingredients: ["Pork","Shrimp","Wrapper","Ginger","Soy sauce"],
          reviews: [
            { name: "Carla S.", stars: 5, comment: "Mapapa wow ka sa sarap!" }
          ]
        },
        {
          id: 4,
          name: "Iced Coffee",
          price: "₱30.00",
          category: "drinks",
          img: "../../images/Iced-coffee.png",
          badge: "",
          rating: 4.8,
          vendor: "Canteen 5",
          prepTime: "3 min",
          desc: "Cold brewed coffee with milk and a hint of vanilla.",
          ingredients: ["Cold brew","Fresh milk","Vanilla syrup","Ice","Sugar"],
          reviews: [
            { name: "Ryan B.", stars: 5, comment: "Perfect pick-me-up between classes!" },
            { name: "Sofia D.", stars: 4, comment: "Really smooth and not too sweet." }
          ]
        },
        {
          id: 5,
          name: "Fries",
          price: "₱25.00",
          category: "snacks",
          img: "../../images/Fries.jpg",
          badge: "",
          rating: 4.6,
          vendor: "Canteen 7",
          prepTime: "7 min",
          desc: "Crispy on the outside and fluffy on the inside, perfectly seasoned fries.",
          ingredients: ["Potato","Vegetable oil","Salt","Seasoning"],
          reviews: [
            { name: "Ken A.", stars: 5, comment: "Always crispy. Never disappoints!" }
          ]
        },
        {
          id: 6,
          name: "Coke",
          price: "₱25.00",
          category: "drinks",
          img: "../../images/coke.png",
          badge: "popular",
          rating: 4.9,
          vendor: "Canteen 2",
          prepTime: "1 min",
          desc: "Icy-cold classic that delivers the perfect refreshing kick.",
          ingredients: ["Carbonated water","Sugar","Caramel color","Caffeine"],
          reviews: [
            { name: "Mia C.", stars: 5, comment: "Ice cold and perfectly chilled!" }
          ]
        }
      ];

      /* ─────────── HELPERS ─────────── */
      function starHtml(r) {
        let h = "";
        const full = Math.floor(r);
        const half = r % 1 >= 0.5;
        for (let i = 0; i < full; i++) h += '<i class="fa-solid fa-star"></i>';
        if (half) h += '<i class="fa-solid fa-star-half-stroke"></i>';
        return h;
      }

      /* ─────────── LOAD SHOP ─────────── */
      function loadShop() {
        const params = new URLSearchParams(window.location.search);
        const sid = parseInt(params.get("id"));
        const shop = shops.find(s => s.id === sid);
        if (!shop) {
          document.querySelector(".main-content").innerHTML =
            '<div style="padding:60px;text-align:center;color:#94a3b8;font-size:18px;">Shop not found.</div>';
          return;
        }

        document.title = `WM EAT SU — ${shop.name}`;

        // Hero
        document.getElementById("shopHeroImg").src = shop.img;
        document.getElementById("shopHeroImg").alt = shop.name;
        document.getElementById("shopHeroAvatarImg").src = shop.img;
        document.getElementById("shopDetailName").textContent = shop.name;

        const catColors = {
          Meals: "#E61524", Snacks: "#f97316", Drinks: "#3b82f6",
          Desserts: "#ec4899", Healthy: "#22c55e"
        };
        const catEl = document.getElementById("shopDetailCat");
        catEl.textContent = shop.category;
        catEl.style.background = catColors[shop.category] || "#64748b";

        const shopFoods = foods.filter(f => shop.foods.includes(f.id));
        document.getElementById("shopDetailRating").innerHTML =
          `<i class="fa-solid fa-star"></i> ${shop.rating.toFixed(1)}`;
        document.getElementById("shopDetailItems").innerHTML =
          `<i class="fa-solid fa-bowl-food"></i> ${shopFoods.length} item${shopFoods.length !== 1 ? "s" : ""}`;

        // About
        document.getElementById("shopDetailDesc").textContent = shop.desc;

        // Menu
        const grid = document.getElementById("shopFoodGrid");
        document.getElementById("shopMenuCount").textContent =
          `${shopFoods.length} item${shopFoods.length !== 1 ? "s" : ""} available`;

        if (shopFoods.length === 0) {
          grid.innerHTML = '<p class="no-items-msg">No menu items listed yet. Check back soon!</p>';
          return;
        }

        grid.innerHTML = shopFoods.map(f => `
          <div class="food-card" data-id="${f.id}">
            <div class="food-image">
              <img src="${f.img}" alt="${f.name}" onerror="this.src='https://placehold.co/300x195/fff0f1/E61524?text=${encodeURIComponent(f.name)}'">
              ${f.badge ? `<span class="food-badge ${f.badge}">${f.badge === "popular" ? "⭐ Popular" : f.badge === "new" ? "✨ New" : f.badge}</span>` : ""}
            </div>
            <div class="food-content">
              <div class="food-header">
                <h3>${f.name}</h3>
                <div class="food-rating">${starHtml(f.rating)}<span>${f.rating}</span></div>
              </div>
              <p class="food-description">${f.desc}</p>
              <div class="food-ingredients">
                ${f.ingredients.slice(0, 3).map(i => `<span class="ingredient-tag">${i}</span>`).join("")}
                ${f.ingredients.length > 3 ? `<span class="ingredient-tag">+${f.ingredients.length - 3} more</span>` : ""}
              </div>
              <div class="food-prep-time"><i class="fa-regular fa-clock"></i> Ready in ${f.prepTime}</div>
              <div class="food-vendor"><i class="fa-solid fa-store"></i> ${f.vendor}</div>
              <div class="food-footer">
                <div class="food-price">${f.price}</div>
                <button class="add-btn add-cart-btn" data-id="${f.id}">
                  <i class="fa-solid fa-plus"></i> Add to Cart
                </button>
              </div>
            </div>
          </div>
        `).join("");

        // Card click → modal
        grid.querySelectorAll(".food-card").forEach(card => {
          card.addEventListener("click", e => {
            if (e.target.closest(".add-cart-btn")) return;
            openModal(+card.dataset.id);
          });
        });

        grid.querySelectorAll(".add-cart-btn").forEach(btn => {
          btn.addEventListener("click", e => {
            e.stopPropagation();
            showToast("success", "fa-check-circle", "Item added to cart successfully!");
          });
        });
      }

      /* ─────────── MODAL ─────────── */
      function openModal(id) {
        const f = foods.find(x => x.id === id);
        if (!f) return;
        document.getElementById("modalImg").src = f.img;
        document.getElementById("modalName").textContent = f.name;
        document.getElementById("modalPrice").textContent = f.price;
        document.getElementById("modalVendor").innerHTML =
          `<i class="fa-solid fa-store" style="color:#3b82f6;margin-right:4px;"></i>${f.vendor}`;
        document.getElementById("modalPrep").innerHTML =
          `<i class="fa-regular fa-clock" style="margin-right:4px;"></i>${f.prepTime}`;
        document.getElementById("modalRating").innerHTML = starHtml(f.rating) + ` ${f.rating}`;
        document.getElementById("modalDesc").textContent = f.desc;
        document.getElementById("modalIngredients").innerHTML = f.ingredients
          .map(i => `<span class="ingredient-tag">${i}</span>`).join("");
        document.getElementById("modalReviews").innerHTML = f.reviews.map(r => `
          <div class="review-item">
            <div class="review-avatar">${r.name[0]}</div>
            <div>
              <div class="review-name">${r.name}</div>
              <div class="review-stars">${"★".repeat(r.stars)}${"☆".repeat(5 - r.stars)}</div>
              <div class="review-comment">${r.comment}</div>
            </div>
          </div>
        `).join("");
        document.getElementById("foodModal").classList.add("open");
      }

      document.getElementById("modalClose").onclick = () =>
        document.getElementById("foodModal").classList.remove("open");
      document.getElementById("foodModal").addEventListener("click", e => {
        if (e.target === document.getElementById("foodModal"))
          document.getElementById("foodModal").classList.remove("open");
      });
      document.getElementById("modalAddBtn").onclick = () => {
        document.getElementById("foodModal").classList.remove("open");
        showToast("success", "fa-check-circle", "Item added to cart successfully!");
      };

      /* ─────────── TOAST ─────────── */
      function showToast(type, icon, msg) {
        const el = document.createElement("div");
        el.className = `toast ${type}`;
        el.innerHTML = `<i class="fa-solid ${icon}"></i><span>${msg}</span>`;
        document.getElementById("toast-container").appendChild(el);
        setTimeout(() => {
          el.classList.add("fade-out");
          setTimeout(() => el.remove(), 300);
        }, 3000);
      }

      /* ─────────── INIT ─────────── */
      loadShop();
    </script>
  </body>
</html>
