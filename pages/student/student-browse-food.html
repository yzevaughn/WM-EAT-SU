<!doctype html>

  <head>

    <title>WM EAT SU — Browse Food</title>
    <meta

      content="Browse delicious food from campus vendors or explore all student canteens on WM EAT SU."
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../../css/navbar.css" />
    <link rel="stylesheet" href="../../css/student/browse-food.css" />
  </head>
  <body>
    <input type="checkbox" id="menu-checkbox" class="menu-checkbox" />

    <!-- ════════════════════════════════════════
         TOP NAVBAR
         ════════════════════════════════════════ -->
    <div class="top-nav">
      <!-- LEFT: hamburger + logo -->
      <div class="nav-left">
        <label for="menu-checkbox" class="menu-toggle">
          <i class="fa-solid fa-bars"></i>
        </label>
        <a href="#" class="logo">
          <div class="logo-icon"><i class="fa-solid fa-utensils"></i></div>
          <span class="logo-text">WM EAT SU</span>
        </a>
      </div>

      <div class="nav-center">
        <div class="role-switcher" id="roleSwitcher">
          <a
            href="student-dashboard.html"
            class="role-btn active"
            id="roleStudent"
          >
            <i class="fa-solid fa-graduation-cap"></i>
            <span>Student</span>
          </a>

          <a
            href="../vendor-pages/vendor-dashboard.html"
            class="role-btn"
            id="roleVendor"
          >
            <i class="fa-solid fa-store"></i>
            <span>Vendor</span>
          </a>
        </div>
      </div>

      <!-- RIGHT: profile -->
      <div class="nav-right">
        <div class="profile">
          <div class="profile-info">
            <span class="profile-name">Vaughn Evangelista</span>
            <span class="email">vaughn.student@wm.edu.ph</span>
          </div>
          <div class="profile-dropdown">
            <button class="profile-btn">
              <img
                src="../../images/pfp.jpg"
                class="profile-pic"
                alt="Profile"
              />
              <i class="fa-solid fa-chevron-down"></i>
            </button>
            <div class="dropdown-menu">
              <a href="student-feedback.html" class="dropdown-item">
                <i class="fa-solid fa-flag"></i><span>Reports</span>
              </a>
              <a href="student-vendor-applications.html" class="dropdown-item">
                <i class="fa-solid fa-rss"></i><span>Vendor Applications</span>
              </a>
              <a
                href="../../index.html"
                class="dropdown-item dropdown-item--danger"
              >
                <i class="fas fa-sign-out-alt"></i><span>Log Out</span>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- /top-nav -->

    <!-- ════════════════════════════════════════
         LAYOUT
         ════════════════════════════════════════ -->
    <div class="layout">
      <!-- ── SIDEBAR ── -->
      <div class="left-nav" id="sidebar">
        <ul class="nav-list">
          <li>
            <a href="student-dashboard.html" class="nav-link">
              <i class="fa-solid fa-house"></i><span>Dashboard</span>
            </a>
          </li>
          <li>
            <a href="student-browse-food.html" class="nav-link active">
              <i class="fa-solid fa-utensils"></i><span>Browse Food</span>
            </a>
          </li>
          <li>
            <a href="student-cart.html" class="nav-link">
              <i class="fa-solid fa-cart-shopping"></i><span>Cart</span>
              <span class="nav-badge">3</span>
            </a>
          </li>
          <li>
            <a href="student-order.html" class="nav-link">
              <i class="fa-solid fa-clock-rotate-left"></i><span>Orders</span>
            </a>
          </li>
          <li>
            <a href="student-wallet.html" class="nav-link">
              <i class="fa-solid fa-wallet"></i><span>Wallet</span>
            </a>
          </li>
        </ul>
      </div>

      <!-- MAIN -->
      <div class="main-content">
        <div class="browse-food-section">
          <!-- PAGE HEADER -->
          <div class="browse-header">
            <h2 id="pageTitle">Browse Food</h2>
            <p id="pageSubtitle">
              Discover delicious meals from our campus vendors
            </p>
          </div>

          <!-- ── FOOD / SHOPS TOGGLE ── -->
          <div class="view-toggle-wrapper">
            <div class="view-toggle" role="tablist">
              <button
                class="toggle-btn active"
                id="toggleFood"
                role="tab"
                aria-selected="true"
                aria-controls="view-food"
              >
                <i class="fa-solid fa-utensils"></i> Food
              </button>
              <button
                class="toggle-btn"
                id="toggleShops"
                role="tab"
                aria-selected="false"
                aria-controls="view-shops"
              >
                <i class="fa-solid fa-store"></i> Shops
              </button>
            </div>
          </div>

          <!-- ══════ FOOD VIEW ══════ -->
          <div id="view-food" role="tabpanel">
            <div class="search-container">
              <div class="search-bar">
                <i class="fa-solid fa-search search-icon"></i>
                <input
                  type="text"
                  placeholder="Search for food..."
                  class="search-input"
                  id="searchInput"
                />
              </div>
            </div>

            <div class="category-filters">
              <button class="filter-btn active" data-cat="all">All</button>
              <button class="filter-btn" data-cat="meals">Meals</button>
              <button class="filter-btn" data-cat="snacks">Snacks</button>
              <button class="filter-btn" data-cat="drinks">Drinks</button>
              <button class="filter-btn" data-cat="desserts">Desserts</button>
              <button class="filter-btn" data-cat="healthy">Healthy</button>
            </div>

            <div class="food-grid" id="foodGrid"></div>

            <!-- PAGINATION -->
            <div class="pagination" id="pagination"></div>
          </div>

          <!-- ══════ SHOPS VIEW ══════ -->
          <div id="view-shops" role="tabpanel" style="display: none">
            <div class="search-container">
              <div class="search-bar">
                <i class="fa-solid fa-search search-icon"></i>
                <input
                  type="text"
                  placeholder="Search shops or vendor..."
                  class="search-input"
                  id="shopSearchInput"
                />
              </div>
            </div>

            <div class="category-filters" id="shopCategoryFilters">
              <button class="filter-btn active" data-shopcat="all">All</button>
              <button class="filter-btn" data-shopcat="Meals">Meals</button>
              <button class="filter-btn" data-shopcat="Snacks">Snacks</button>
              <button class="filter-btn" data-shopcat="Drinks">Drinks</button>
              <button class="filter-btn" data-shopcat="Desserts">
                Desserts
              </button>
              <button class="filter-btn" data-shopcat="Healthy">Healthy</button>
            </div>

            <div class="shop-grid" id="shopGrid"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- FOOD DETAIL MODAL -->
    <div class="food-modal-overlay" id="foodModal">
      <div class="food-modal">
        <img id="modalImg" class="modal-img" src="" alt="" />
        <div class="modal-body">
          <div class="modal-header-row">
            <div>
              <div class="modal-food-name" id="modalName"></div>
              <div class="modal-food-price" id="modalPrice"></div>
            </div>
            <button class="modal-close-btn" id="modalClose">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </div>
          <div
            style="
              display: flex;
              gap: 10px;
              flex-wrap: wrap;
              margin-bottom: 10px;
            "
          >
            <span
              id="modalVendor"
              style="font-size: 13px; color: #64748b"
            ></span>
            <span id="modalPrep" style="font-size: 13px; color: #f97316"></span>
            <span
              id="modalRating"
              style="font-size: 13px; color: #fbbf24; font-weight: 700"
            ></span>
          </div>
          <div class="modal-section-label">Description</div>
          <p
            id="modalDesc"
            style="font-size: 14px; color: #64748b; line-height: 1.6"
          ></p>
          <div class="modal-section-label">Ingredients</div>
          <div id="modalIngredients" class="food-ingredients"></div>
          <div class="modal-section-label">Customer Reviews</div>
          <div id="modalReviews"></div>
          <button class="modal-add-btn" id="modalAddBtn">
            <i class="fa-solid fa-cart-shopping"></i> Add to Cart
          </button>
        </div>
      </div>
    </div>

    <!-- TOAST CONTAINER -->
    <div id="toast-container"></div>

    <script>
      /* ─────────── DATA — FOODS ─────────── */
      const foods = [
        {
          id: 1,
          name: "Burger",
          price: "₱30.00",
          category: "meals",
          img: "../../images/burger.avif",
          badge: "popular",

          ingredients: [

            "Special sauce",
            "Bun",
          ],
          reviews: [
            {
              name: "Ana R.",

              comment: "Best burger on campus! Always fresh.",
            },
            {
              name: "Mark T.",
              stars: 4,
              comment: "Great taste, a bit small for the price.",
            },
          ],
        },
        {
          id: 2,
          name: "Shomai Rice",
          price: "₱20.00",
          category: "meals",
          img: "../../images/Shomai-rice.jpg",
          badge: "",
          rating: 5.0,
          vendor: "Student Vendor",
          prepTime: "5 min",
          desc: "Steamed dumplings served over warm rice with savory sauce.",
          ingredients: [
            "Shomai",
            "White rice",
            "Soy sauce",
            "Sesame oil",
            "Green onion",
          ],
          reviews: [
            {
              name: "Lisa M.",
              stars: 5,
              comment: "Absolutely love this! Perfect comfort food.",
            },
            {
              name: "Jake P.",
              stars: 5,
              comment: "Worth every peso. Filling and delicious.",
            },
          ],
        },
        {
          id: 3,
          name: "Shomai",
          price: "₱15.99",
          category: "snacks",
          img: "../../images/Shomai.jpg",
          badge: "new",
          rating: 4.7,
          vendor: "Canteen 3",
          prepTime: "6 min",
          desc: "Classic steamed dumplings with pork and prawn filling.",
          ingredients: ["Pork", "Shrimp", "Wrapper", "Ginger", "Soy sauce"],
          reviews: [
            { name: "Carla S.", stars: 5, comment: "Mapapa wow ka sa sarap!" },
          ],
        },
        {
          id: 4,
          name: "Iced Coffee",
          price: "₱30.00",
          category: "drinks",
          img: "../../images/Iced-coffee.png",
          badge: "",
          rating: 4.8,
          vendor: "Canteen 5",
          prepTime: "3 min",
          desc: "Cold brewed coffee with milk and a hint of vanilla.",
          ingredients: [
            "Cold brew",
            "Fresh milk",
            "Vanilla syrup",
            "Ice",
            "Sugar",
          ],
          reviews: [
            {
              name: "Ryan B.",
              stars: 5,
              comment: "Perfect pick-me-up between classes!",
            },
            {
              name: "Sofia D.",
              stars: 4,
              comment: "Really smooth and not too sweet.",
            },
          ],
        },
        {
          id: 5,
          name: "Fries",
          price: "₱25.00",
          category: "snacks",
          img: "../../images/Fries.jpg",
          badge: "",
          rating: 4.6,
          vendor: "Canteen 7",
          prepTime: "7 min",
          desc: "Crispy on the outside and fluffy on the inside, perfectly seasoned fries.",
          ingredients: ["Potato", "Vegetable oil", "Salt", "Seasoning"],
          reviews: [
            {
              name: "Ken A.",
              stars: 5,
              comment: "Always crispy. Never disappoints!",
            },
          ],
        },
        {
          id: 6,
          name: "Coke",
          price: "₱25.00",
          category: "drinks",
          img: "../../images/coke.png",
          badge: "popular",
          rating: 4.9,
          vendor: "Canteen 2",
          prepTime: "1 min",
          desc: "Icy-cold classic that delivers the perfect refreshing kick.",
          ingredients: [
            "Carbonated water",
            "Sugar",
            "Caramel color",
            "Caffeine",
          ],
          reviews: [
            {
              name: "Mia C.",
              stars: 5,
              comment: "Ice cold and perfectly chilled!",
            },
          ],
        },
      ];

      /* ─────────── DATA — SHOPS ─────────── */
      const shops = [
        {
          id: 1,
          name: "Mang Tino's Canteen",
          category: "Meals",
          img: "../../images/silog.avif",
          rating: 4.5,
          foodIds: [1, 2],
        },
        {
          id: 2,
          name: "Street Bites Corner",
          category: "Snacks",
          img: "../../images/kwek.jpg",
          rating: 4.7,
          foodIds: [3, 5],
        },
        {
          id: 3,
          name: "Sip & Chill Beverages",
          category: "Drinks",
          img: "../../images/milktea.avif",
          rating: 4.8,
          foodIds: [4, 6],
        },
        {
          id: 4,
          name: "Sweet Tooth Desserts",
          category: "Desserts",
          img: "../../images/halo.avif",
          rating: 4.6,
          foodIds: [],
        },
        {
          id: 5,
          name: "Green Bowl — Healthy Eats",
          category: "Healthy",
          img: "../../images/pancit.avif",
          rating: 4.9,
          foodIds: [],
        },
        {
          id: 6,
          name: "Campus Pizza Hub",
          category: "Meals",
          img: "../../images/pizza.avif",
          rating: 4.4,
          foodIds: [],
        },
      ];

      /* ─────────── STATE ─────────── */
      const PER_PAGE = 4;
      let filtered = [...foods];
      let page = 1;
      let activeCat = "all";
      let activeFood = null;
      let activeView = "food"; // 'food' | 'shops'
      let activeShopCat = "all";
      let filteredShops = [...shops];

      /* ─────────── HELPERS ─────────── */
      function starHtml(r) {
        let h = "";
        const full = Math.floor(r);
        const half = r % 1 >= 0.5;
        for (let i = 0; i < full; i++) h += '<i class="fa-solid fa-star"></i>';
        if (half) h += '<i class="fa-solid fa-star-half-stroke"></i>';
        return h;
      }

      const catBadgeClass = {
        Meals: "meals",
        Snacks: "snacks",
        Drinks: "drinks",
        Desserts: "desserts",
        Healthy: "healthy",
      };

      /* ─────────── TOGGLE ─────────── */
      document
        .getElementById("toggleFood")
        .addEventListener("click", () => switchView("food"));
      document
        .getElementById("toggleShops")
        .addEventListener("click", () => switchView("shops"));

      function switchView(view) {
        activeView = view;

        const foodView = document.getElementById("view-food");
        const shopsView = document.getElementById("view-shops");
        const btnFood = document.getElementById("toggleFood");
        const btnShops = document.getElementById("toggleShops");
        const title = document.getElementById("pageTitle");
        const subtitle = document.getElementById("pageSubtitle");

        if (view === "food") {
          foodView.style.display = "";
          shopsView.style.display = "none";
          btnFood.classList.add("active");
          btnShops.classList.remove("active");
          btnFood.setAttribute("aria-selected", "true");
          btnShops.setAttribute("aria-selected", "false");
          title.textContent = "Browse Food";
          subtitle.textContent =
            "Discover delicious meals from our campus vendors";
        } else {
          foodView.style.display = "none";
          shopsView.style.display = "";
          btnFood.classList.remove("active");
          btnShops.classList.add("active");
          btnFood.setAttribute("aria-selected", "false");
          btnShops.setAttribute("aria-selected", "true");
          title.textContent = "Browse Shops";
          subtitle.textContent =
            "Explore all student vendor canteens and businesses";
          renderShops();
        }
      }

      /* ─────────── READ URL PARAM ON LOAD ─────────── */
      (function () {
        const params = new URLSearchParams(window.location.search);
        if (params.get("tab") === "shops") switchView("shops");
      })();

      /* ════════════ FOOD SECTION ════════════ */

      /* ─────────── RENDER GRID ─────────── */
      function renderGrid() {
        const grid = document.getElementById("foodGrid");
        const start = (page - 1) * PER_PAGE;
        const pageItems = filtered.slice(start, start + PER_PAGE);

        if (pageItems.length === 0) {
          grid.innerHTML =
            '<p style="color:#94a3b8;padding:40px 0;text-align:center;grid-column:1/-1;">No food items found.</p>';
          renderPagination();
          return;
        }

        grid.innerHTML = pageItems
          .map(
            (f) => `
    <div class="food-card" data-id="${f.id}">
      <div class="food-image">
        <img src="${f.img}" alt="${f.name}" onerror="this.src='https://placehold.co/300x195/fff0f1/E61524?text=${encodeURIComponent(f.name)}'">
        ${f.badge ? `<span class="food-badge ${f.badge}">${f.badge === "popular" ? "⭐ Popular" : f.badge === "new" ? "✨ New" : f.badge}</span>` : ""}
      </div>
      <div class="food-content">
        <div class="food-header">
          <h3>${f.name}</h3>
          <div class="food-rating">${starHtml(f.rating)}<span>${f.rating}</span></div>
        </div>
        <p class="food-description">${f.desc}</p>
        <div class="food-ingredients">
          ${f.ingredients
            .slice(0, 3)
            .map((i) => `<span class="ingredient-tag">${i}</span>`)
            .join("")}
          ${f.ingredients.length > 3 ? `<span class="ingredient-tag">+${f.ingredients.length - 3} more</span>` : ""}
        </div>
        <div class="food-prep-time"><i class="fa-regular fa-clock"></i> Ready in ${f.prepTime}</div>
        <div class="food-vendor"><i class="fa-solid fa-store"></i> ${f.vendor}</div>
        <div class="food-footer">
          <div class="food-price">${f.price}</div>
          <button class="add-btn add-cart-btn" data-id="${f.id}" data-name="${f.name}">
            <i class="fa-solid fa-plus"></i> Add to Cart
          </button>
        </div>
      </div>
    </div>
  `,
          )
          .join("");

        // card click → modal
        grid.querySelectorAll(".food-card").forEach((card) => {
          card.addEventListener("click", (e) => {
            if (e.target.closest(".add-cart-btn")) return;
            openModal(+card.dataset.id);
          });
        });

        // add to cart buttons
        grid.querySelectorAll(".add-cart-btn").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();

            const itemName = btn.getAttribute("data-name");

            // Visual button feedback
            const originalHTML =
              '<i class="fa-solid fa-plus"></i> Add to Cart';
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Added!';
            btn.style.background = "#16a34a";
            btn.style.boxShadow = "0 4px 14px rgba(22, 163, 74, 0.35)";

            // Show success toast
            showToast("success", "fa-cart-plus", `"${itemName}" added to cart!`);

            // Reset button after delay
            setTimeout(() => {
              btn.innerHTML = originalHTML;
              btn.style.background = "";
              btn.style.boxShadow = "";
            }, 2000);
          });
        });

        renderPagination();
      }

      /* ─────────── PAGINATION ─────────── */
      function renderPagination() {
        const total = Math.ceil(filtered.length / PER_PAGE);
        const pag = document.getElementById("pagination");
        if (total <= 1) {
          pag.innerHTML = "";
          return;
        }

        let html = `<button class="page-btn arrow" ${page === 1 ? "disabled" : ""} id="pgPrev"><i class="fa-solid fa-chevron-left"></i></button>`;
        for (let i = 1; i <= total; i++) {
          html += `<button class="page-btn${i === page ? " active" : ""}" data-p="${i}">${i}</button>`;
        }
        html += `<button class="page-btn arrow" ${page === total ? "disabled" : ""} id="pgNext"><i class="fa-solid fa-chevron-right"></i></button>`;
        pag.innerHTML = html;

        pag.querySelectorAll("[data-p]").forEach(
          (b) =>
            (b.onclick = () => {
              page = +b.dataset.p;
              renderGrid();
            }),
        );
        pag.querySelector("#pgPrev").onclick = () => {
          if (page > 1) {
            page--;
            renderGrid();
          }
        };
        pag.querySelector("#pgNext").onclick = () => {
          if (page < total) {
            page++;
            renderGrid();
          }
        };
      }

      /* ─────────── MODAL ─────────── */
      function openModal(id) {
        const f = foods.find((x) => x.id === id);
        if (!f) return;
        activeFood = f;
        document.getElementById("modalImg").src = f.img;
        document.getElementById("modalName").textContent = f.name;
        document.getElementById("modalPrice").textContent = f.price;
        document.getElementById("modalVendor").innerHTML =
          `<i class="fa-solid fa-store" style="color:#3b82f6;margin-right:4px;"></i>${f.vendor}`;
        document.getElementById("modalPrep").innerHTML =
          `<i class="fa-regular fa-clock" style="margin-right:4px;"></i>${f.prepTime}`;
        document.getElementById("modalRating").innerHTML =
          starHtml(f.rating) + ` ${f.rating}`;
        document.getElementById("modalDesc").textContent = f.desc;
        document.getElementById("modalIngredients").innerHTML = f.ingredients
          .map((i) => `<span class="ingredient-tag">${i}</span>`)
          .join("");
        document.getElementById("modalReviews").innerHTML = f.reviews
          .map(
            (r) => `
    <div class="review-item">
      <div class="review-avatar">${r.name[0]}</div>
      <div>
        <div class="review-name">${r.name}</div>
        <div class="review-stars">${"★".repeat(r.stars)}${"☆".repeat(5 - r.stars)}</div>
        <div class="review-comment">${r.comment}</div>
      </div>
    </div>
  `,
          )
          .join("");
        document.getElementById("foodModal").classList.add("open");
      }

      document.getElementById("modalClose").onclick = () =>
        document.getElementById("foodModal").classList.remove("open");
      document.getElementById("foodModal").addEventListener("click", (e) => {
        if (e.target === document.getElementById("foodModal"))
          document.getElementById("foodModal").classList.remove("open");
      });
      document.getElementById("modalAddBtn").onclick = () => {
        showToast(
          "success",
          "fa-cart-plus",
          `"${activeFood.name}" added to cart!`,
        );
        document.getElementById("foodModal").classList.remove("open");
      };

      /* ─────────── FOOD FILTERS ─────────── */
      document.querySelectorAll(".filter-btn[data-cat]").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll(".filter-btn[data-cat]")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          activeCat = btn.dataset.cat;
          applyFilters();
        });
      });

      document
        .getElementById("searchInput")
        .addEventListener("input", applyFilters);

      function applyFilters() {
        const q = document.getElementById("searchInput").value.toLowerCase();
        filtered = foods.filter((f) => {
          const matchCat = activeCat === "all" || f.category === activeCat;
          const matchQ =
            !q ||
            f.name.toLowerCase().includes(q) ||
            f.vendor.toLowerCase().includes(q);
          return matchCat && matchQ;
        });
        page = 1;
        renderGrid();
      }

      /* ════════════ SHOPS SECTION ════════════ */

      /* ─────────── RENDER SHOPS ─────────── */
      function renderShops() {
        const grid = document.getElementById("shopGrid");

        if (filteredShops.length === 0) {
          grid.innerHTML =
            '<p style="color:#94a3b8;padding:60px 20px;text-align:center;grid-column:1/-1;font-size:15px;background:#f8fafc;border-radius:16px;border:1.5px dashed #e2e8f0;">No shops found.</p>';
          return;
        }

        grid.innerHTML = filteredShops
          .map((s) => {
            const itemCount = s.foodIds.length;
            const catClass = catBadgeClass[s.category] || "meals";
            return `
              <a
                class="shop-card"
                href="student-shop-details.html?id=${s.id}"
                id="shop-card-${s.id}"
                aria-label="View ${s.name}"
              >
                <div class="shop-card-image">
                  <img
                    src="${s.img}"
                    alt="${s.name}"
                    onerror="this.src='https://placehold.co/400x175/f8f9fa/94a3b8?text=${encodeURIComponent(s.name)}'"
                  />
                  <div class="shop-card-image-overlay"></div>
                  <span class="shop-cat-badge ${catClass}">${s.category}</span>
                  <div class="shop-card-arrow"><i class="fa-solid fa-arrow-right"></i></div>
                </div>
                <div class="shop-card-body">
                  <div class="shop-card-name">${s.name}</div>
                  <div class="shop-card-meta">
                    <div class="shop-card-rating">
                      <i class="fa-solid fa-star"></i>
                      ${s.rating.toFixed(1)}
                    </div>
                    <div class="shop-card-items">
                      <i class="fa-solid fa-bowl-food"></i>
                      ${itemCount} item${itemCount !== 1 ? "s" : ""}
                    </div>
                  </div>
                  <div class="shop-card-divider"></div>
                  <div class="shop-card-cta">
                    <span class="shop-card-cta-text">View Menu</span>
                    <i class="fa-solid fa-chevron-right"></i>
                  </div>
                </div>
              </a>
            `;
          })
          .join("");
      }

      /* ─────────── SHOP FILTERS ─────────── */
      document.querySelectorAll(".filter-btn[data-shopcat]").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll(".filter-btn[data-shopcat]")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          activeShopCat = btn.dataset.shopcat;
          applyShopFilters();
        });
      });

      document
        .getElementById("shopSearchInput")
        .addEventListener("input", applyShopFilters);

      function applyShopFilters() {
        const q = document
          .getElementById("shopSearchInput")
          .value.toLowerCase();
        filteredShops = shops.filter((s) => {
          const matchCat =
            activeShopCat === "all" || s.category === activeShopCat;
          const matchQ =
            !q ||
            s.name.toLowerCase().includes(q) ||
            s.category.toLowerCase().includes(q);
          return matchCat && matchQ;
        });
        renderShops();
      }

      /* ─────────── TOAST ─────────── */
      function showToast(type, icon, msg) {
        const el = document.createElement("div");
        el.className = `toast ${type}`;
        el.innerHTML = `<i class="fa-solid ${icon}"></i><span>${msg}</span>`;
        document.getElementById("toast-container").appendChild(el);
        setTimeout(() => {
          el.classList.add("fade-out");
          setTimeout(() => el.remove(), 300);
        }, 3000);
      }

      /* ─────────── INIT ─────────── */
      renderGrid();
    </script>
  </body>
</html>
