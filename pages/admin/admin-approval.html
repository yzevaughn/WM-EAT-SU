<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WM EAT SU - Admin Approval</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link rel="stylesheet" href="../../css/navbar.css" />
    <link rel="stylesheet" href="../../css/admin-css/admin-dashboard.css" />
    <link rel="stylesheet" href="../../css/admin-css/admin-approval.css" />
  </head>
  <body>
    <input type="checkbox" id="menu-checkbox" class="menu-checkbox" />

    <!-- ════════════════════════════════════════
         TOP NAVBAR
         ════════════════════════════════════════ -->
    <div class="top-nav">
      <!-- LEFT: hamburger + logo -->
      <div class="nav-left">
        <label for="menu-checkbox" class="menu-toggle">
          <i class="fa-solid fa-bars"></i>
        </label>
        <a href="#" class="logo">
          <div class="logo-icon"><i class="fa-solid fa-utensils"></i></div>
          <span class="logo-text">WM EAT SU</span>
        </a>
      </div>
      <div class="nav-center"></div>
      <!-- RIGHT: profile -->
      <div class="nav-right">
        <div class="profile">
          <div class="profile-info">
            <span class="profile-name">Vaughn Evangelista</span>
            <span class="email">vaughn.student@wm.edu.ph</span>
          </div>
          <div class="profile-dropdown">
            <button class="profile-btn">
              <img
                src="../../images/pfp.jpg"
                class="profile-pic"
                alt="Profile"
              />
              <i class="fa-solid fa-chevron-down"></i>
            </button>
            <div class="dropdown-menu">
              <a href="../../index.html" class="dropdown-item">
                <i class="fas fa-sign-out-alt"></i><span>Log Out</span>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- /top-nav -->

    <!-- ════════════════════════════════════════
         LAYOUT
         ════════════════════════════════════════ -->
    <div class="layout">
      <!-- ── SIDEBAR ── -->
      <div class="left-nav" id="sidebar">
        <!-- logo shown on mobile inside sidebar -->

        <ul class="nav-list">
          <li>
            <a href="admin-dashboard.html" class="nav-link">
              <i class="fa-solid fa-house"></i>
              <span>Dashboard</span>
            </a>
          </li>
          <li>
            <a href="student-applications.html" class="nav-link">
              <i class="fa-solid fa-user-check"></i>
              <span>Student Applications</span>
            </a>
          </li>
          <li>
            <a href="complaints.html" class="nav-link">
              <i class="fa-solid fa-comment-dots"></i>
              <span>Complaints</span>
            </a>
          </li>
          <li>
            <a href="assign-vendor.html" class="nav-link">
              <i class="fa-solid fa-user-plus"></i>
              <span>Assign Vendor</span>
            </a>
          </li>
          <li>
            <a href="admin-approval.html" class="nav-link active">
              <i class="fa-solid fa-clipboard-check"></i>
              <span>Content Approval</span>
            </a>
          </li>
        </ul>
      </div>

      <div class="main-content">
        <div class="container">
          <!-- title and description of the page -->
          <header>
            <h1>Content Approval</h1>
            <p class="subtitle">Review and manage menus and posters submitted by vendors</p>
          </header>

          <!-- filter section for status -->
          <div class="filter-controls">
            <div class="tabs-container" id="approvalTabs">
              <button class="tab active" data-tab="menus-pending">Menus Pending (<span id="count-menus">0</span>)</button>
              <button class="tab" data-tab="posters-pending">Posters Pending (<span id="count-posters">0</span>)</button>
              <button class="tab" data-tab="approved">Approved Content (<span id="count-approved">0</span>)</button>
            </div>
          </div>

          <!-- display area -->
          <div id="approvalList" class="approval-grid">
             <!-- data populated by js -->
          </div>

          <!-- when theres nothing, show empty state -->
          <div class="empty-state" id="emptyState" style="display:none">
            <div class="empty-icon">
              <i class="fa-solid fa-clipboard"></i>
            </div>
            <p class="empty-text">No items looking for approval right now.</p>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Scripts -->
    <script src="../../script/admin-js/admin-approval.js"></script>
  </body>
</html>
