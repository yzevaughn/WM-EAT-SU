<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WM EAT SU - Admin Complaints</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../../css/student/dashboard.css">
  <link rel="stylesheet" href="../../css/navbar.css">
  <link rel="stylesheet" href="../../css/admin-css/admin-dashboard.css">

  <link rel="stylesheet" href="../../css/admin-css/complaints.css">
</head>
<body>

  <!-- NAVBAR -->
  <div class="top-nav">
    <div class="nav-left">
      <button class="menu-toggle" id="menuToggle">
        <i class="fa-solid fa-bars"></i>
      </button>

      <a href="#" class="logo">
        <div class="logo-icon"><i class="fa-solid fa-utensils"></i></div>
        <span class="logo-text">WM EAT SU</span>
      </a>
    </div>

    <div class="profile">
      <div class="profile-info">
        <span class="profile-name">Admin Name</span>
        <span class="email">admin@wmsu.edu.ph</span>
      </div>

      <div class="profile-dropdown">
        <button class="profile-btn" id="profileBtn">
          <img src="../../images/pfp.jpg" class="profile-pic">
          <i class="fa-solid fa-chevron-down"></i>
        </button>
        <div class="dropdown-menu" id="profileDropdown">
          <a href="../../index.html" class="dropdown-item">
            <i class="fas fa-sign-out-alt"></i>
            <span>Log Out</span>
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- LAYOUT -->
  <div class="layout">

    <!-- SIDEBAR -->
    <div class="left-nav" id="sidebar">
      <ul class="nav-list">
        <li>
          <a href="admin-dashboard.html" class="nav-link">
            <i class="fa-solid fa-house"></i>
            <span>Dashboard</span>
          </a>
        </li>
        <li>
          <a href="student-applications.html" class="nav-link">
            <i class="fa-solid fa-user-check"></i>
            <span>Student Applications</span>
          </a>
        </li>
        <li>
          <a href="complaints.html" class="nav-link active">
            <i class="fa-solid fa-comment-dots"></i>
            <span>Complaints</span>
          </a>
        </li>
        <li>
          <a href="create-vendor.html" class="nav-link">
            <i class="fa-solid fa-user-plus"></i>
            <span>Create Vendor</span>
          </a>
        </li>
      </ul>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <div class="container">
        <header>
            <h1>Complaints Management</h1>
            <p class="subtitle">View, track, and resolve customer complaints</p>
        </header>

        <div class="cards-grid">
            <div class="card card-open">
                <div class="card-info">
                    <span class="card-label">Open</span>
                    <span class="card-value">0</span>
                </div>
                <div class="icon-wrapper">
                    <i class="fa-solid fa-exclamation"></i>
                </div>
            </div>

            <div class="card card-progress">
                <div class="card-info">
                    <span class="card-label">In Progress</span>
                    <span class="card-value">0</span>
                </div>
                <div class="icon-wrapper">
                    <i class="fa-solid fa-clock"></i>
                </div>
            </div>

            <div class="card card-resolved">
                <div class="card-info">
                    <span class="card-label">Resolved</span>
                    <span class="card-value">0</span>
                </div>
                <div class="icon-wrapper">
                    <i class="fa-solid fa-check"></i>
                </div>
            </div>

            <div class="card card-closed">
                <div class="card-info">
                    <span class="card-label">Closed</span>
                    <span class="card-value">0</span>
                </div>
                <div class="icon-wrapper">
                    <i class="fa-regular fa-comment"></i>
                </div>
            </div>
        </div>

        <div class="tabs-container">
            <button class="tab active">Open (0)</button>
            <button class="tab">In Progress (0)</button>
            <button class="tab">Resolved (0)</button>
            <button class="tab">Closed (0)</button>
        </div>

        <div class="empty-state">
            <div class="empty-icon">
                <i class="fa-solid fa-exclamation"></i>
            </div>
            <p class="empty-text">No open complaints</p>
        </div>
      </div>
    </div>

  </div> <!-- end layout -->

  
  <script>lucide.createIcons();</script>

</body>
</html>
