<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WM EAT SU - Admin Complaints</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link rel="stylesheet" href="../../css/navbar.css" />
    <link rel="stylesheet" href="../../css/admin-css/admin-dashboard.css" />
    <link rel="stylesheet" href="../../css/admin-css/complaints.css" />
  </head>
  <body>
    <input type="checkbox" id="menu-checkbox" class="menu-checkbox" />

    <!-- ════════════════════════════════════════
         TOP NAVBAR
         ════════════════════════════════════════ -->
    <div class="top-nav">
      <!-- LEFT: hamburger + logo -->
      <div class="nav-left">
        <label for="menu-checkbox" class="menu-toggle">
          <i class="fa-solid fa-bars"></i>
        </label>
        <a href="#" class="logo">
          <div class="logo-icon"><i class="fa-solid fa-utensils"></i></div>
          <span class="logo-text">WM EAT SU</span>
        </a>
      </div>
      <div class="nav-center"></div>
      <!-- RIGHT: profile -->
      <div class="nav-right">
        <div class="profile">
          <div class="profile-info">
            <span class="profile-name">Vaughn Evangelista</span>
            <span class="email">vaughn.student@wm.edu.ph</span>
          </div>
          <div class="profile-dropdown">
            <button class="profile-btn">
              <img
                src="../../images/pfp.jpg"
                class="profile-pic"
                alt="Profile"
              />
              <i class="fa-solid fa-chevron-down"></i>
            </button>
            <div class="dropdown-menu">
              <a href="../../index.html" class="dropdown-item">
                <i class="fas fa-sign-out-alt"></i><span>Log Out</span>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- /top-nav -->

    <!-- ════════════════════════════════════════
         LAYOUT
         ════════════════════════════════════════ -->
    <div class="layout">
      <!-- ── SIDEBAR ── -->
      <div class="left-nav" id="sidebar">
        <!-- logo shown on mobile inside sidebar -->

        <ul class="nav-list">
          <li>
            <a href="admin-dashboard.html" class="nav-link">
              <i class="fa-solid fa-house"></i>
              <span>Dashboard</span>
            </a>
          </li>
          <li>
            <a href="student-applications.html" class="nav-link">
              <i class="fa-solid fa-user-check"></i>
              <span>Student Applications</span>
            </a>
          </li>
          <li>
            <a href="complaints.html" class="nav-link active">
              <i class="fa-solid fa-comment-dots"></i>
              <span>Complaints</span>
            </a>
          </li>
          <li>
            <a href="assign-vendor.html" class="nav-link">
              <i class="fa-solid fa-user-plus"></i>
              <span>Assign Vendor</span>
            </a>
          </li>
          <li>
            <a href="admin-approval.html" class="nav-link">
              <i class="fa-solid fa-clipboard-check"></i>
              <span>Content Approval</span>
            </a>
          </li>
        </ul>
      </div>

      <div class="main-content">
        <div class="container">
          <!-- title and description of the page -->
          <header>
            <h1>Complaints Management</h1>
            <p class="subtitle">View, track, and resolve customer complaints</p>
          </header>

          <!-- cards showing complaint status counts -->
          <div class="cards-grid">
            <div class="card card-progress">
              <div class="card-info">
                <span class="card-label">In Progress</span>
                <span class="card-value">0</span>
              </div>
              <div class="icon-wrapper">
                <i class="fa-solid fa-spinner"></i>
              </div>
            </div>

            <div class="card card-resolved">
              <div class="card-info">
                <span class="card-label">Resolved</span>
                <span class="card-value">0</span>
              </div>
              <div class="icon-wrapper">
                <i class="fa-solid fa-circle-check"></i>
              </div>
            </div>

            <div class="card card-closed">
              <div class="card-info">
                <span class="card-label">Closed</span>
                <span class="card-value">0</span>
              </div>
              <div class="icon-wrapper">
                <i class="fa-solid fa-box-archive"></i>
              </div>
            </div>
          </div>

          <!-- filter section for status -->
          <div class="filter-controls">
            <div class="tabs-container" id="statusTabs">
              <button class="tab active" data-status="In Progress">
                In Progress (<span id="count-progress">0</span>)
              </button>
              <button class="tab" data-status="Resolved">
                Resolved (<span id="count-resolved">0</span>)
              </button>
              <button class="tab" data-status="Closed">
                Closed (<span id="count-closed">0</span>)
              </button>
            </div>
          </div>

          <!-- complaints display area -->
          <div id="complaintsList" class="complaints-list">
            <!-- data populated by complaints.js -->
          </div>

          <!-- pagination -->
          <div
            class="pagination-controls"
            id="paginationControls"
            style="display: none"
          >
            <button class="btn-page" id="prevPage" disabled>
              <i class="fa-solid fa-chevron-left"></i>
            </button>
            <div class="page-numbers" id="pageNumbers"></div>
            <button class="btn-page" id="nextPage">
              <i class="fa-solid fa-chevron-right"></i>
            </button>
          </div>

          <!-- when theres nothing, show empty state -->
          <div class="empty-state" id="emptyState" style="display: none">
            <div class="empty-icon">
              <i class="fa-solid fa-inbox"></i>
            </div>
            <p class="empty-text">No complaints matching this filter</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="../../script/admin-js/complaints.js"></script>
  </body>
</html>
