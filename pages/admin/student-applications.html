<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WM EAT SU - Admin Student Applications</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="../../css/student/dashboard.css">
  <link rel="stylesheet" href="../../css/navbar.css">
  <link rel="stylesheet" href="../../css/admin-css/admin-dashboard.css">
  <style>
    .dashboard-section {
      max-width: 900px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 16px;
      color: #64748b;
    }

    .stats-grid {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      flex: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px;
      border-radius: 12px;
      border: 1px solid transparent;
    }

    .stat-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-label {
      font-size: 14px;
      font-weight: 500;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
    }

    .icon-wrapper {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .stat-card.pending {
      background-color: #fffde7;
      border-color: #fef08a;
    }
    .stat-card.pending .stat-label { color: #854d0e; }
    .stat-card.pending .stat-value { color: #713f12; }
    .stat-card.pending .icon-wrapper {
      background-color: #fde047;
      color: #854d0e;
    }

    .stat-card.approved {
      background-color: #f0fdf4;
      border-color: #bbf7d0;
    }
    .stat-card.approved .stat-label { color: #166534; }
    .stat-card.approved .stat-value { color: #14532d; }
    .stat-card.approved .icon-wrapper {
      background-color: #bbf7d0;
      color: #166534;
    }

    .stat-card.rejected {
      background-color: #fef2f2;
      border-color: #fecaca;
    }
    .stat-card.rejected .stat-label { color: #991b1b; }
    .stat-card.rejected .stat-value { color: #7f1d1d; }
    .stat-card.rejected .icon-wrapper {
      background-color: #fecaca;
      color: #991b1b;
    }

    .empty-state {
      background-color: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 60px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .empty-state i {
      font-size: 48px;
      color: #cbd5e1;
      margin-bottom: 16px;
    }

    .empty-state p {
      font-size: 15px;
      color: #64748b;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <div class="top-nav">
    <div class="nav-left">
      <button class="menu-toggle" id="menuToggle">
        <i class="fa-solid fa-bars"></i>
      </button>

      <a href="#" class="logo">
        <div class="logo-icon"><i class="fa-solid fa-utensils"></i></div>
        <span class="logo-text">WM EAT SU</span>
      </a>
    </div>

    <div class="profile">
      <div class="profile-info">
        <span class="profile-name">Admin Name</span>
        <span class="email">admin@wmsu.edu.ph</span>
      </div>

      <div class="profile-dropdown">
        <button class="profile-btn" id="profileBtn">
          <img src="../../images/pfp.jpg" class="profile-pic">
          <i class="fa-solid fa-chevron-down"></i>
        </button>
        <div class="dropdown-menu" id="profileDropdown">
          <a href="../../index.html" class="dropdown-item">
            <i class="fas fa-sign-out-alt"></i>
            <span>Log Out</span>
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- LAYOUT -->
  <div class="layout">

    <!-- SIDEBAR -->
    <div class="left-nav" id="sidebar">
      <ul class="nav-list">
        <li>
          <a href="admin-dashboard.html" class="nav-link">
            <i class="fa-solid fa-house"></i>
            <span>Dashboard</span>
          </a>
        </li>
        <li>
          <a href="student-applications.html" class="nav-link active">
            <i class="fa-solid fa-user-check"></i>
            <span>Student Applications</span>
          </a>
        </li>
        <li>
          <a href="complaints.html" class="nav-link">
            <i class="fa-solid fa-comment-dots"></i>
            <span>Complaints</span>
          </a>
        </li>
        <li>
          <a href="create-vendor.html" class="nav-link">
            <i class="fa-solid fa-user-plus"></i>
            <span>Create Vendor</span>
          </a>
        </li>
      </ul>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <div class="dashboard-section">
        <header class="header">
          <h1>Student Applications</h1>
          <p>Review and manage student vendor applications</p>
        </header>

        <div class="stats-grid">
          <div class="stat-card pending">
            <div class="stat-content">
              <span class="stat-label">Pending</span>
              <span class="stat-value">0</span>
            </div>
            <div class="icon-wrapper">
              <i class="ph ph-clock"></i>
            </div>
          </div>

          <div class="stat-card approved">
            <div class="stat-content">
              <span class="stat-label">Approved</span>
              <span class="stat-value">0</span>
            </div>
            <div class="icon-wrapper">
              <i class="ph ph-check-circle"></i>
            </div>
          </div>

          <div class="stat-card rejected">
            <div class="stat-content">
              <span class="stat-label">Rejected</span>
              <span class="stat-value">0</span>
            </div>
            <div class="icon-wrapper">
              <i class="ph ph-x-circle"></i>
            </div>
          </div>
        </div>

        <div class="empty-state">
          <i class="ph-fill ph-file-text"></i>
          <p>No student applications submitted yet</p>
        </div>
      </div>
    </div>

  </div> <!-- end layout -->

  <script src="../../script/dropdown.js"></script>
  <script src="../../script/menu.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script>lucide.createIcons();</script>

</body>
</html>
