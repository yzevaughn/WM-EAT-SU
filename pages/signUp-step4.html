<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WM EAT SU — Success</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/sign-in-up.css" />
  </head>

  <body class="success-page">
    <div class="page-grid">
      <div class="card">
        <!-- SIDEBAR (same as Step 3) -->
        <aside class="sidebar">
          <div class="sb-brand">
            <div class="sb-icon"><i class="fa-solid fa-utensils"></i></div>
            <div class="sb-name">WM EAT SU</div>
            <div class="sb-tag">
              Your Campus Food,<br />serve delicious food
            </div>
          </div>

          <nav class="sb-steps">
            <div class="sb-step completed">
              <div class="sb-dot"><i class="fa-solid fa-user"></i></div>
              <div class="sb-step-name">Student Info</div>
              <div class="sb-step-sub">Name, email & password</div>
            </div>

            <div class="sb-step completed">
              <div class="sb-dot"><i class="fa-solid fa-file-lines"></i></div>
              <div class="sb-step-name">Documents</div>
              <div class="sb-step-sub">COE & School ID</div>
            </div>

            <div class="sb-step completed">
              <div class="sb-dot">
                <i class="fa-solid fa-envelope-circle-check"></i>
              </div>
              <div class="sb-step-name">Verify Email</div>
              <div class="sb-step-sub">4-digit OTP code</div>
            </div>
          </nav>
        </aside>

        <!-- RIGHT PANEL -->
        <section class="form-panel">
          <!-- REMOVE TOP BAR (optional) -->
          <div class="fp-body">
            <!-- SUCCESS PANEL ONLY -->
            <div class="success-panel active">
              <div class="suc-ring">
                <i class="fa-solid fa-check"></i>
              </div>

              <h2>Welcome to WM EAT SU! 🎉</h2>

              <p>
                Your account is created and pending document review. We'll email
                you once you're approved to order.
              </p>

              <a href="signin.html" class="btn btn-primary">
                <i class="fa-solid fa-bowl-food"></i>
                Go to Sign in
              </a>
            </div>
          </div>
        </section>
      </div>
    </div>
  </body>
</html>
